<!DOCTYPE html>
<html>
<head>
<title>New Zealand Flight Countdown</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#0b1d2a;
color:white;
}

h1{
font-size:50px;
margin-top:40px;
}

#countdown{
font-size:40px;
margin-bottom:40px;
}

.photo-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
width:700px;
margin:auto;
}

.photo{
width:100%;
height:250px;
object-fit:cover;
border-radius:12px;
transition:opacity 2s;
opacity:1;
}

</style>
</head>

<body>

<h1>✈️ New Zealand Trip Countdown</h1>

<div id="countdown"></div>

<div class="photo-grid">
<img class="photo">
<img class="photo">
<img class="photo">
<img class="photo">
</div>

<script>

// FLIGHT TIME
const flightDate = new Date("March 13, 2026 16:15:00").getTime();

// COUNTDOWN
setInterval(function(){

const now = new Date().getTime();
const distance = flightDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+" days "+hours+" hours "+minutes+" minutes "+seconds+" seconds";

},1000);


// PHOTO LIST (20 photos)

const photos = [

"https://images.unsplash.com/photo-1501785888041-af3ef285b470",
"https://images.unsplash.com/photo-1469474968028-56623f02e42e",
"https://images.unsplash.com/photo-1500534314209-a25ddb2bd429",
"https://images.unsplash.com/photo-1472214103451-9374bd1c798e",
"https://images.unsplash.com/photo-1506744038136-46273834b3fb",
"https://images.unsplash.com/photo-1493244040629-496f6d136cc3",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e",
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
"https://images.unsplash.com/photo-1519681393784-d120267933ba",
"https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
"https://images.unsplash.com/photo-1464822759844-d150baec3e5f",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1482192596544-9eb780fc7f66",
"https://images.unsplash.com/photo-1447752875215-b2761acb3c5d",
"https://images.unsplash.com/photo-1476611338391-6f395a0ebc86",
"https://images.unsplash.com/photo-1465101046530-73398c7f28ca",
"https://images.unsplash.com/photo-1500534623283-312aade485b7",
"https://images.unsplash.com/photo-1491553895911-0055eca6402d",
"https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
"https://images.unsplash.com/photo-1501785888041-af3ef285b470"

];

function randomPhoto(){
return photos[Math.floor(Math.random()*photos.length)];
}

function changePhotos(){

const imgs = document.querySelectorAll(".photo");

// fade out
imgs.forEach(img=>{
img.style.opacity=0;
});

setTimeout(()=>{

imgs.forEach(img=>{
img.src=randomPhoto();
img.style.opacity=1;
});

},2000);

}

// load first photos
changePhotos();

// change every 10 seconds
setInterval(changePhotos,10000);

</script>

</body>
</html>
