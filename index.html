<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flight to New Zealand</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: black;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .image-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
            flex-wrap: wrap;
        }

        .image-row img {
            width: 300px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        #countdown {
            font-size: 2.5em;
            margin: 30px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <h1>Countdown to New Zealand ✈️🇳🇿</h1>

    <!-- TOP ROW (My Picks 😎) -->
    <div class="image-row">
        <!-- Auckland Skyline -->
        <img src="https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?auto=format&fit=crop&w=800&q=80" alt="Auckland">

        <!-- Queenstown Mountains -->
        <img src="https://images.unsplash.com/photo-1507699622108-4be3abd695ad?auto=format&fit=crop&w=800&q=80" alt="Queenstown">
    </div>

    <!-- COUNTDOWN -->
    <div id="countdown"></div>

    <!-- BOTTOM ROW (Your Picks 🌌🏔️) -->
    <div class="image-row">
        <!-- NZ Mountain View -->
        <img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=800&q=80" alt="New Zealand Mountain">

        <!-- Milky Way NZ -->
        <img src="https://images.unsplash.com/photo-1444703686981-a3abbc4d4fe3?auto=format&fit=crop&w=800&q=80" alt="Milky Way New Zealand">
    </div>

    <script>
        const flightDate = new Date("2026-03-13T16:15:00").getTime();
        const countdown = document.getElementById("countdown");

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = flightDate - now;

            if (distance <= 0) {
                countdown.innerHTML = "We’re on the plane! 🛫";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdown.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
