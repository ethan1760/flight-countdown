<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Countdown</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #87ceeb, #f0f8ff);
            margin: 0;
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .countdown-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px; /* space between countdown and image */
            flex-wrap: wrap;
        }
        #countdown {
            font-size: 2em;
            background: rgba(255,255,255,0.7);
            padding: 20px;
            border-radius: 10px;
            min-width: 200px;
            text-align: center;
        }
        .side-image img {
            max-width: 300px;
            border-radius: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <h1>Countdown to Our Flight ✈️</h1>

    <div class="countdown-container">
        <div id="countdown"></div>
        <div class="side-image">
            <!-- Nice landscape photo next to countdown -->
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=400&q=80" alt="Landscape">
        </div>
    </div>

    <script>
        // Flight date and time (local time)
        const flightDate = new Date("2026-03-13T16:15:00").getTime();

        const countdown = document.getElementById("countdown");

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = flightDate - now;

            if (distance <= 0) {
                countdown.innerHTML = "We’re on the plane! 🛫";
                clearInterval(interval);
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            countdown.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }

        const interval = setInterval(updateCountdown, 1000);
        updateCountdown(); // initial call
    </script>
</body>
</html>
